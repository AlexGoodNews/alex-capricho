backend:
  name: github
  repo: AlexGoodNews/alex-capricho
  branch: main # Branch to update (optional; defaults to master)
  site_domain: https://alex-capricho.pages.dev/
  base_url: https://alex-capricho.pages.dev/
  auth_endpoint: /api/auth
media_folder: static/uploads
public_folder: static/uploads

collections:
  - name: "puntos"
    label: "Puntos del Museo"
    files:
      - name: "puntos"
        label: "Puntos"
        file: "data/puntos.json"
        fields:
          - label: "Lista de puntos"
            name: "puntos"
            widget: "list"
            fields:
              - { label: "ID", name: "id", widget: "string" }

              - label: "Nombre"
                name: "nombre"
                widget: "object"
                fields:
                  - { label: "ES", name: "es", widget: "string" }
                  - { label: "EN", name: "en", widget: "string" }

              - label: "Descripción"
                name: "descripcion"
                widget: "object"
                fields:
                  - { label: "ES", name: "es", widget: "text" }
                  - { label: "EN", name: "en", widget: "text" }

              - label: "Coordenadas"
                name: "coords"
                widget: "list"
                fields:
                  - { label: "Valor", name: "value", widget: "number" }

              - { label: "Accesible", name: "accesible", widget: "boolean" }

              - label: "Media"
                name: "media"
                widget: "object"
                fields:
                  - { label: "Audio ES", name: "audio_es", widget: "file" }
                  - { label: "Audio EN", name: "audio_en", widget: "file" }
                  - { label: "Video Signos", name: "video_signos", widget: "file" }
