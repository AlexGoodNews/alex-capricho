<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <title>Editor de eventos</title>

  <!--<link rel="stylesheet" href="css/fullcalendar.css">-->

  <style>
    body {
      font-family: Arial;
      margin: 20px;
    }

    #calendar {
      max-width: 900px;
      margin: auto;
    }

    #modalEvento {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }

    #modalContent {
      background: white;
      padding: 30px;
      border-radius: 15px;
      width: 400px;
    }
  </style>

</head>

<body>

  <h1>Gestión de eventos</h1>
  <div id="calendar"></div>

  <script src="index.global.min.js"></script>

  <script>
    document.addEventListener('DOMContentLoaded', function () {
      const calendarEl = document.getElementById('calendar');
      const modal = document.getElementById("modalEvento");
      const inputTitulo = document.getElementById("inputTitulo");
      const inputHora = document.getElementById("inputHora");
      const inputUbicacion = document.getElementById("inputUbicacion");
      const inputDescripcion = document.getElementById("inputDescripcion");
      const btnGuardar = document.getElementById("guardarEvento");
      const btnCancelar = document.getElementById("cancelarEvento");

      let fechaSeleccionada = "";
      let eventos = []; // ⚠️ Declarar antes

      // Inicializar calendar
      const calendar = new FullCalendar.Calendar(calendarEl, {
        initialView: 'dayGridMonth',
        locale: 'es',
        events: eventos,

        dateClick: function (info) {
          fechaSeleccionada = info.dateStr;
          modal.style.display = "flex";
          inputTitulo.value = "";
          inputHora.value = "12:00";
          inputUbicacion.value = "";
          inputDescripcion.value = "";
        },

        eventClick: function (info) {
          if (confirm("¿Eliminar evento?")) {
            eventos = eventos.filter(e => e.start !== info.event.startStr);
            info.event.remove();
            guardarEventosServidor(); // Guardar en JSON
          }
        }
      });

      calendar.render();

      // Cargar eventos del servidor
      fetch('data/eventos.json')
        .then(res => res.json())
        .then(data => {
          eventos = data;
          calendar.removeAllEvents();
          calendar.addEventSource(eventos);
        });

      // Guardar evento nuevo
      btnGuardar.addEventListener("click", function () {
        const nuevoEvento = {
          title: inputTitulo.value,
          start: fechaSeleccionada + "T" + inputHora.value,
          extendedProps: {
            ubicacion: inputUbicacion.value,
            descripcion: inputDescripcion.value
          }
        };
        eventos.push(nuevoEvento);
        calendar.addEvent(nuevoEvento);
        modal.style.display = "none";
        guardarEventosServidor(); // ⚡ Guardar automáticamente
      });

      btnCancelar.addEventListener("click", function () {
        modal.style.display = "none";
      });

      // Función para guardar en servidor
      function guardarEventosServidor() {
        fetch('data/eventos.json', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(eventos)
        }).then(res => res.json())
          .then(data => console.log("Eventos guardados", data))
          .catch(err => console.error("Error guardando eventos", err));
      }
    });
  </script>
  <!-- Modal para crear evento -->
  <div id="modalEvento" style="display:none;">
    <div id="modalContent">
      <h2>Nuevo Evento</h2>
      <label>Título:</label>
      <input type="text" id="inputTitulo"><br><br>

      <label>Hora inicio:</label>
      <input type="time" id="inputHora"><br><br>

      <label>Ubicación:</label>
      <input type="text" id="inputUbicacion"><br><br>

      <label>Descripción:</label>
      <textarea id="inputDescripcion" rows="3"></textarea><br><br>

      <button id="guardarEvento">Guardar</button>
      <button id="cancelarEvento">Cancelar</button>
    </div>
  </div>
</body>

</html>
